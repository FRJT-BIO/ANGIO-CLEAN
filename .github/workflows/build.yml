name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build plugin (and ij.jar)
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Compile and run tests (headless, under xvfb)
        timeout-minutes: 5
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          mkdir -p .test
          javac -cp ij.jar:Angio-CLEAN_.jar -d .test src/test/java/TestAngioV3.java
          xvfb-run -a timeout 120 java -Djava.awt.headless=true -cp ij.jar:Angio-CLEAN_.jar:.test TestAngioV3
          echo "Tests finished; forcing clean exit."

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: Angio-CLEAN_jar
          path: Angio-CLEAN_.jar
